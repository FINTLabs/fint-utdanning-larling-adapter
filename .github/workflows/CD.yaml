name: CD

on:
  workflow_call:
    inputs:
      cluster:
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=sha,enable=true,priority=100,prefix=shaF-,suffix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Conditionally set which namespaces to deploy to, based on which cluster we're deploying to
  init:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.set-matrix.outputs.targets }}
    steps:
      - name: Set targets matrix
        id: set-matrix
        shell: bash
        run: |
          cluster="${{ inputs.cluster }}"
          
          if [[ "$cluster" == "aks-api-fint-2022-02-08" ]]; then
            targets='["afk-no", "agderfk-no", "bfk-no", "ffk-no", "innlandetfylke-no", "mrfylke-no", "nfk-no", "ofk-no", "rogfk-no", "telemarkfylke-no", "tromsfylke-no", "trondelagfylke-no", "ude-oslo-kommune-no", "vestfoldfylke-no", "vlfk-no"]'
          elif [[ "$cluster" == "aks-beta-fint-2021-11-23" ]]; then
            targets='["afk-no", "agderfk-no", "bfk-no", "ffk-no", "innlandetfylke-no", "mrfylke-no", "nfk-no", "ofk-no", "rogfk-no", "telemarkfylke-no", "tromsfylke-no", "trondelagfylke-no", "ude-oslo-kommune-no", "vestfoldfylke-no", "vlfk-no"]'
          elif [[ "$cluster" == "aks-alpha-fint-2021-11-18" ]]; then
            targets='["fintlabs-no"]'
          else
            echo "Unknown cluster: $cluster" >&2
            exit 1
          fi
          
          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "Computed targets for $env: $targets"

  deploy-to-aks:
    name: deploy for ${{ matrix.org }} to ${{ matrix.cluster }}
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - init
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        org:
          ${{ fromJSON(needs.init.outputs.targets) }}
        cluster:
          - ${{ inputs.cluster }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0

      - name: Get environment
        uses: actions/github-script@v8
        id: environment
        with:
          script: return '${{ inputs.cluster }}'.split('-')[1]
          result-encoding: string

      - name: Get resource group name
        uses: actions/github-script@v8
        id: resource-group
        with:
          script: return 'rg-aks-${{ steps.environment.outputs.result }}'
          result-encoding: string

      - name: Update image tag
        run: |
          sed -i "s|image: ghcr.io/fintlabs/fint-utdanning-larling-adapter:.*|image: ${{ needs.build-and-push.outputs.tags }}|" kustomize/base/flais.yaml

      - name: Bake manifests with Kustomize
        id: bake
        uses: azure/k8s-bake@v4
        with:
          renderEngine: 'kustomize'
          kustomizationPath: 'kustomize/overlays/${{ steps.environment.outputs.result }}/${{ matrix.org }}'

      - name: Determine secret name
        id: secretname
        run: |
          echo "SECRET_NAME=$(echo AKS_${{ steps.environment.outputs.result }}_FINT_GITHUB | tr '[:lower:]' '[:upper:]')" >> $GITHUB_OUTPUT

      - uses: azure/login@v3
        with:
          creds: ${{ secrets[ steps.secretname.outputs.SECRET_NAME ] }}

      - uses: azure/use-kubelogin@v1.3
        with:
          kubelogin-version: 'v0.0.26'

      - name: Set the target cluster
        uses: azure/aks-set-context@v5
        with:
          cluster-name: '${{ matrix.cluster }}'
          resource-group: '${{ steps.resource-group.outputs.result }}'
          admin: 'true'
          use-kubelogin: 'true'

      - name: Create Namespace if it doesn't exist
        run: |
          if ! kubectl get namespace ${{ matrix.org }}; then
            kubectl create namespace ${{ matrix.org }}
          fi

      - name: Deploy
        uses: azure/k8s-deploy@v6.0.0
        with:
          action: deploy
          manifests: ${{ steps.bake.outputs.manifestsBundle }}
          namespace: ${{ matrix.org }}